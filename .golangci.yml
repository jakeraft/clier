version: "2"

linters:
  enable:
    - errorlint
    - unconvert
    - unparam
    - misspell
    - nilerr
    - sqlclosecheck
    - perfsprint
    - modernize
  settings:
    errcheck:
      exclude-functions:
        - (*github.com/jakeraft/clier/internal/adapter/db.Store).Close
        - (*database/sql.DB).Close
        - (*database/sql.Tx).Rollback
  exclusions:
    paths:
      - internal/adapter/db/generated

issues:
  max-same-issues: 0
