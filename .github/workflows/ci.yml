name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v2.11.4
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - run: make ci
